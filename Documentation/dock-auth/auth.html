<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Arcivura Auth Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #050505; color: #e5e5e5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .gold-border { border: 1px solid #d4af37; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .node { transition: all 0.3s ease; }
        .active-node { border-color: #d4af37; box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); transform: scale(1.05); }
    </style>
</head>
<body class="p-10">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-4xl font-black gold-text mb-2 uppercase tracking-tighter">Arcivura Engine v3</h1>
            <p class="text-gray-500 italic">محاكي تدفق البيانات ومنطق المصادقة - إبريل 2026</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-10">
            <button onclick="simulate('superadmin')" class="p-4 bg-gray-900 rounded-xl gold-border hover:bg-gray-800 transition shadow-lg">
                <i class="fas fa-crown mb-2 block text-2xl"></i> Super Admin
            </button>
            <button onclick="simulate('admin')" class="p-4 bg-gray-900 rounded-xl border border-gray-800 hover:gold-border transition">
                <i class="fas fa-user-shield mb-2 block text-2xl"></i> Admin
            </button>
            <button onclick="simulate('seeker')" class="p-4 bg-gray-900 rounded-xl border border-gray-800 hover:gold-border transition">
                <i class="fas fa-user-tie mb-2 block text-2xl"></i> Job Seeker
            </button>
            <button onclick="simulate('moderator')" class="p-4 bg-gray-900 rounded-xl border border-gray-800 hover:gold-border transition">
                <i class="fas fa-eye mb-2 block text-2xl"></i> Moderator
            </button>
        </div>

        <div id="flow-container" class="bg-gray-900 p-8 rounded-[2rem] gold-border min-h-[400px] relative overflow-hidden">
            <div id="welcome-msg" class="text-center py-20">
                <i class="fas fa-project-diagram text-6xl text-gray-800 mb-4"></i>
                <p class="text-gray-600">اختر نوع المستخدم لبدء محاكاة البروتوكول</p>
            </div>
            
            <div id="steps" class="space-y-6 hidden">
                </div>
        </div>
    </div>

    <script>
        const protocols = {
            superadmin: [
                { title: "Database Seeder", desc: "النظام لا يسمح بإنشاء Super Admin يدوياً.", icon: "fa-database" },
                { title: "Direct Login", desc: "استخدام البريد وكلمة المرور المشفرة مباشرة.", icon: "fa-key" },
                { title: "Access Granted", desc: "دخول كامل لجميع الصلاحيات والـ Activity Logs.", icon: "fa-check-double" }
            ],
            admin: [
                { title: "Admin Creation", desc: "يتم إنشاؤه بواسطة الـ Super Admin فقط.", icon: "fa-user-plus" },
                { title: "OTP Generation", desc: "إرسال رمز التحقق إلى البريد الإلكتروني المسجل.", icon: "fa-envelope-open-text" },
                { title: "Temp Password Check", desc: "إجبار المستخدم على تغيير كلمة المرور المؤقتة.", icon: "fa-shield-alt" },
                { title: "Admin Panel Access", desc: "الوصول للصلاحيات الإدارية المحددة.", icon: "fa-lock-open" }
            ],
            seeker: [
                { title: "Identity Entry", desc: "إدخال رقم الهاتف أو البريد الإلكتروني.", icon: "fa-id-card" },
                { title: "Multi-Channel OTP", desc: "إرسال رمز التحقق عبر SMS أو Email.", icon: "fa-mobile-alt" },
                { title: "Google OAuth Link", desc: "التحقق من وجود ربط مع حساب جوجل.", icon: "fa-google" },
                { title: "Profile Ready", desc: "بدء رفع السيرة الذاتية ومعالجتها بالذكاء الاصطناعي.", icon: "fa-rocket" }
            ],
            moderator: [
                { title: "Staff Credential Entry", desc: "تسجيل الدخول ببريد العمل وكلمة المرور المحددة مسبقاً.", icon: "fa-user-lock" },
                { title: "Mandatory Email OTP", desc: "إرسال رمز تحقق إلزامي لضمان أمان الدخول للموظفين.", icon: "fa-shield-virus" },
                { title: "Role-Based Validation", desc: "تحقق الـ Middleware من صلاحية 'المشرف' لتوجيهه للوحة التحكم.", icon: "fa-user-check" },
                { title: "Restricted Access", desc: "فتح صلاحيات إدارة السير الذاتية ومراقبة السجلات فقط.", icon: "fa-lock-open" }
            ],
        };

        function simulate(type) {
            const container = document.getElementById('steps');
            const welcome = document.getElementById('welcome-msg');
            container.innerHTML = '';
            welcome.classList.add('hidden');
            container.classList.remove('hidden');

            protocols[type].forEach((step, index) => {
                setTimeout(() => {
                    const stepDiv = document.createElement('div');
                    stepDiv.className = 'node p-4 bg-black rounded-xl border-l-4 border-gray-800 flex items-center gap-4 animate-pulse';
                    stepDiv.innerHTML = `
                        <div class="w-10 h-10 gold-bg text-black rounded-full flex items-center justify-center font-bold">${index + 1}</div>
                        <div>
                            <h3 class="gold-text font-bold uppercase text-sm">${step.title}</h3>
                            <p class="text-xs text-gray-400">${step.desc}</p>
                        </div>
                        <i class="fas ${step.icon} ms-auto text-gray-700"></i>
                    `;
                    container.appendChild(stepDiv);
                    setTimeout(() => stepDiv.classList.remove('animate-pulse', 'border-gray-800'), 500);
                    stepDiv.classList.add('active-node');
                }, index * 800);
            });
        }
    </script>
</body>
</html>
